<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>失物招领处</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#070b07;--panel:#0c110c;--bdr:#1a2e1a;--bdr2:#264226;
  --tx:#8ab58a;--dim:#3d5e3d;--brt:#c0f0c0;--name:#e8c87a;
  --yan:#9ecfee;--mo:#c9a8f0;--sys:#5a8a5a;--err:#f08080;
  --good:#80f0a0;--bad:#f07070;--warn:#f0c860;--led:#a8d8a8;
  --btn:#0b180b;--btnH:#162e16;--btnB:#245224;--btnHB:#3a823a;
  --spBg:#1a180a;--sp:#d8b860;--spB:#4a4018;
  --dnBg:#180a0a;--dn:#f09090;--dnB:#4a1818;
}
html,body{height:100%;background:var(--bg);color:var(--tx);
  font-family:'Courier New',monospace;font-size:15px;line-height:1.65}
body{display:flex;justify-content:center;min-height:100vh;padding:14px}

/* MODAL */
#modal{position:fixed;inset:0;background:rgba(0,0,0,0.93);
  display:flex;justify-content:center;align-items:center;z-index:999}
#mbox{background:var(--panel);border:1px solid var(--bdr2);
  padding:34px 42px;max-width:400px;width:92%;text-align:center}
#mbox h2{font-size:1rem;letter-spacing:7px;font-weight:normal;color:var(--brt);margin-bottom:4px}
.msub{font-size:.7rem;letter-spacing:2px;color:var(--dim);margin-bottom:4px}
#mstory{font-size:.8rem;color:var(--sys);line-height:2.1;
  margin:18px 0 20px;text-align:left;border-left:2px solid var(--bdr2);padding-left:12px}
#mstory em{color:var(--tx);font-style:normal}
.mlbl{font-size:.68rem;letter-spacing:2px;color:var(--dim);margin-bottom:8px}
#nin{width:100%;background:transparent;border:none;border-bottom:1px solid var(--btnB);
  color:var(--name);font-family:'Courier New',monospace;font-size:1.05rem;
  text-align:center;padding:7px 0;outline:none;letter-spacing:2px;transition:border-color .25s}
#nin:focus{border-bottom-color:var(--btnHB)}
#nin::placeholder{color:var(--dim);font-size:.82rem}
#nok{margin-top:20px;background:transparent;border:1px solid var(--btnB);
  color:var(--tx);font-family:'Courier New',monospace;font-size:.78rem;
  letter-spacing:3px;padding:9px 30px;cursor:pointer;transition:.25s}
#nok:hover{background:var(--btnH);border-color:var(--btnHB);color:var(--brt)}

/* APP */
#app{width:100%;max-width:760px;display:flex;flex-direction:column}

/* HEADER */
#hdr{border:1px solid var(--bdr2);border-bottom:none;padding:9px 14px;
  display:flex;justify-content:space-between;align-items:center;
  background:var(--panel);flex-wrap:wrap;gap:6px}
#htitle{font-size:.88rem;letter-spacing:5px;color:var(--brt);font-weight:normal}
#hstat{display:flex;gap:6px;flex-wrap:wrap}
.si{font-size:.64rem;letter-spacing:1px;color:var(--dim);
  border:1px solid var(--bdr);padding:2px 9px;background:var(--bg)}
.si b{color:var(--yan)}

/* TIMER BAR */
#timerbar{height:3px;background:var(--bdr);position:relative;transition:none}
#timerfill{height:100%;background:var(--good);transition:width .4s linear}
#timerbar.low #timerfill{background:var(--warn)}
#timerbar.critical #timerfill{background:var(--bad)}

/* OUTPUT */
#out{border:1px solid var(--bdr2);background:var(--bg);
  padding:14px 16px;height:400px;overflow-y:auto;
  white-space:pre-wrap;word-break:break-all;scroll-behavior:smooth}
#out::-webkit-scrollbar{width:4px;background:var(--bg)}
#out::-webkit-scrollbar-thumb{background:var(--bdr2);border-radius:2px}

.ol{color:var(--brt);font-weight:bold}
.on{color:var(--tx)}
.oi{color:var(--dim);font-style:italic}
.oy{color:var(--yan)}
.om{color:var(--mo)}
.ou{color:var(--dim)}
.os{color:var(--sys);font-style:italic}
.ow{color:var(--warn)}
.oe{color:var(--err)}
.og{color:var(--good);font-weight:bold}
.ob{color:var(--bad);font-weight:bold}
.oG{color:var(--good);font-size:1.02rem;font-weight:bold;letter-spacing:2px}
.oB{color:var(--bad);font-size:1.02rem;font-weight:bold;letter-spacing:2px}
.oN{color:var(--warn);font-size:1.02rem;font-weight:bold;letter-spacing:2px}
.oLK{color:var(--dim)}
.oLV{color:var(--led)}
.oLH{color:var(--name)}
.osep{color:var(--dim)}
.oitem{color:var(--name)}

/* CHOICES */
#ch{border:1px solid var(--bdr2);border-top:none;padding:10px 12px;
  background:var(--panel);display:flex;flex-wrap:wrap;gap:6px;min-height:50px}
.cb{background:var(--btn);border:1px solid var(--btnB);color:var(--tx);
  font-family:'Courier New',monospace;font-size:.75rem;padding:6px 13px;
  cursor:pointer;transition:all .18s;letter-spacing:.4px;white-space:nowrap}
.cb:hover{background:var(--btnH);border-color:var(--btnHB);color:var(--brt)}
.cb:active{transform:scale(.97)}
.sp{background:var(--spBg);border-color:var(--spB);color:var(--sp)}
.sp:hover{border-color:#886830}
.dn{background:var(--dnBg);border-color:var(--dnB);color:var(--dn)}
.dn:hover{border-color:#882828}

/* LEDGER */
.lrow{display:flex;gap:0;padding:1px 0 1px 10px;border-left:2px solid var(--bdr2)}
.lk{color:var(--dim);min-width:70px;flex-shrink:0}
.lv{color:var(--led)}.lh{color:var(--name)}

/* MO NOTES PANEL */
#notes-panel{display:none;border:1px solid var(--bdr2);border-top:none;
  padding:10px 14px;background:#0a0d14;max-height:120px;overflow-y:auto;
  font-size:.72rem;color:var(--mo)}
#notes-panel.visible{display:block}
.note-entry{margin-bottom:4px;opacity:.8}

body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:9998;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.025) 2px,rgba(0,0,0,.025) 4px)}

/* ── GLITCH EFFECTS ── */
@keyframes timerFlicker{
  0%,100%{opacity:1}
  50%{opacity:.2}
}
@keyframes textGlitch{
  0%{color:var(--yan);transform:translate(0)}
  20%{color:#ff9aee;transform:translate(-2px,0)}
  40%{color:var(--yan);transform:translate(2px,0)}
  60%{color:#a8f0ff;transform:translate(0)}
  80%{color:var(--yan);transform:translate(1px,0)}
  100%{color:var(--yan);transform:translate(0)}
}
@keyframes moGlitch{
  0%{color:var(--mo);transform:translate(0)}
  25%{color:#ff8888;transform:translate(2px,0)}
  50%{color:var(--mo);transform:translate(-1px,0)}
  75%{color:#ffcc00;transform:translate(1px,0)}
  100%{color:var(--mo);transform:translate(0)}
}
.glitch-yan{animation:textGlitch .4s steps(1) forwards}
.glitch-mo{animation:moGlitch .4s steps(1) forwards}
.timer-flicker{animation:timerFlicker .15s steps(1) 4}
.shelf-corrupt{color:#ff4444!important;font-style:italic}

@media(max-width:580px){
  body{padding:6px}
  #out{height:260px;font-size:13px}
  .cb{font-size:.7rem;padding:5px 9px}
}
</style>
</head>
<body>

<div id="modal">
  <div id="mbox">
    <h2>◈ 失物招领处</h2>
    <div class="msub">LOST &amp; FOUND</div>
    <div id="mstory">
      你似乎什么都不记得了。<br>
      周围是黑暗。是走廊。<br>
      是某栋楼里的某个地方。<br><br>
      你不知道自己怎么来的，<br>
      不知道出口在哪里。<br><br>
      <em>但或许你还记得你的名字。</em>
    </div>
    <div class="mlbl">你的名字是——</div>
    <input id="nin" type="text" placeholder="在此输入" maxlength="10" autocomplete="off"/>
    <br><button id="nok">进 入</button>
  </div>
</div>

<div id="app">
  <div id="hdr">
    <h1 id="htitle">◈ 失物招领处</h1>
    <div id="hstat">
      <div class="si">地点 <b id="stL">—</b></div>
      <div class="si">时间 <b id="stT">20</b></div>
      <div class="si">死亡 <b id="stD">0</b></div>
      <div class="si">道具 <b id="stI">0</b></div>
      <div class="si">怀疑 <b id="stS">0</b></div>
    </div>
  </div>
  <div id="timerbar"><div id="timerfill" style="width:100%"></div></div>
  <div id="out"></div>
  <div id="notes-panel"></div>
  <div id="ch"></div>
</div>

<script>
// ═══════════════════════════
// STATE
// ═══════════════════════════
let P='旅人';
let nameHistory=[]; // names from previous runs
let lastFirstVisit=null; // what player visited first last run
let endingsUnlocked=new Set(); // track which endings player has seen
const ALL_ENDINGS=['good','normalA','normalB','bad1','bad2','bad3','death1','death2','death3','timeout','assistYan','assistMo'];
let G={
  loc:'corridor',inv:[],sus:0,deaths:0,
  yanV:0,moV:0,loopQ:0,moLoopQ:0,
  corridorSeen:false,hasNote:false,noteUsed:false,
  chap:1,ended:false,
  // items
  bandageTalked:false,
  sawShelf:false,
  // inspect flags
  inspected:{},
  // npc seen flags
  npcsSeen:[],
  // mo notes (experiment log)
  moNotes:[],
  // timer
  timeLeft:60,
  totalMoves:0,
  // item use
  usedItems:[],
};



// ═══════════════════════════
// SPEAKER NAME HELPERS
// ═══════════════════════════
function pYan(){
  const name = G.yanNamed ? '晏明烛' : '？？？';
  p(name+'：','oy');
}
function pMo(){
  const name = G.moNamed ? '莫承威' : '？？？';
  p(name+'：','om');
}

// ═══════════════════════════
// NARRATIVE GLITCH
// ═══════════════════════════
function narrativeGlitch(el, fakeText, delay=300, duration=400){
  // show fake text briefly, then restore
  if(!el) return;
  const real = el.textContent;
  setTimeout(()=>{
    el.classList.add('glitch-yan');
    el.textContent = fakeText;
    setTimeout(()=>{
      el.textContent = real;
      el.classList.remove('glitch-yan');
    }, duration);
  }, delay);
}

// Called after yanWho() when loopQ hits certain values
function maybeNarrativeGlitchYan(){
  // find last .oy element that contains "1997"
  const lines = Array.from(out.querySelectorAll('.oy'));
  const line1997 = lines.find(el=>el.textContent.includes('1997'));
  if(line1997){
    narrativeGlitch(line1997, '"管理员。"', 400, 500);
  }
}

// Called when Mo says "左边走廊" - glitch to show a different direction
function narrativeGlitchMo(){
  const lines = Array.from(out.querySelectorAll('.om'));
  const target = lines.find(el=>el.textContent.includes('左边走廊'));
  if(target){
    narrativeGlitch(target, '"你走了——"', 300, 600);
  }
}

// Called when yan mentions a death date - briefly shows player name
function narrativeGlitchDeath(){
  if(G.sus < 4) return;
  const lines = Array.from(out.querySelectorAll('.on'));
  const target = lines.find(el=>el.textContent.includes('四月十二日'));
  if(target){
    // flash to show player's own name
    const real = target.textContent;
    setTimeout(()=>{
      target.classList.add('glitch-yan');
      target.textContent = target.textContent.replace('林晓晨', P);
      setTimeout(()=>{
        target.textContent = real;
        target.classList.remove('glitch-yan');
      }, 500);
    }, 800);
  }
}

// ═══════════════════════════
// VISUAL GLITCH EFFECTS
// ═══════════════════════════
let glitchArmed = false;

function armGlitch(){
  if(G.sus>=4 && !glitchArmed){
    glitchArmed = true;
    // from now on p() is pGlitch
    window._origP = window.p || p;
  }
}

function maybeGlitchYan(){
  // 30% chance to glitch a yan line if sus>=6
  return G.sus>=6 && Math.random()<0.3;
}

function maybeGlitchMo(){
  return G.sus>=5 && Math.random()<0.25;
}

function flashTimerGlitch(){
  if(G.sus<3) return;
  const el = document.getElementById('stT');
  if(!el) return;
  el.classList.add('timer-flicker');
  // show wrong number briefly
  const real = G.timeLeft;
  el.textContent = Math.floor(Math.random()*20);
  setTimeout(()=>{
    el.textContent = real;
    el.classList.remove('timer-flicker');
  }, 600);
}

function glitchYanLine(el){
  el.classList.add('glitch-yan');
  setTimeout(()=>el.classList.remove('glitch-yan'), 500);
}

function glitchMoLine(el){
  el.classList.add('glitch-mo');
  setTimeout(()=>el.classList.remove('glitch-mo'), 500);
}

// Override p() to sometimes glitch yan/mo lines
const _p = p;
function pGlitch(t='',c='on'){
  _p(t,c);
  if(!G.sus) return;
  const last = out.lastElementChild;
  if(!last) return;
  if(c==='oy' && maybeGlitchYan()){
    setTimeout(()=>glitchYanLine(last), 200+Math.random()*300);
  }
  if(c==='om' && maybeGlitchMo()){
    setTimeout(()=>glitchMoLine(last), 200+Math.random()*300);
  }
}

// Periodic timer flicker
setInterval(()=>{
  if(!G.ended && G.sus>=3 && Math.random()<0.15){
    flashTimerGlitch();
  }
}, 4000);

// Bookshelf corrupt effect in clinic
function triggerShelfCorrupt(){
  if(G.sus<5) return;
  const entries = out.querySelectorAll('.on');
  if(!entries.length) return;
  const target = entries[Math.floor(Math.random()*entries.length)];
  target.classList.add('shelf-corrupt');
  setTimeout(()=>target.classList.remove('shelf-corrupt'), 800);
}

// ═══════════════════════════
// OUTPUT
// ═══════════════════════════
const out=document.getElementById('out');
function p(t='',c='on'){
  const d=document.createElement('div');
  d.className=c; d.textContent=t;
  out.appendChild(d); out.scrollTop=out.scrollHeight;
}
function pb(){p('','on')}
function sep(){p('─'.repeat(50),'osep')}
function clr(){out.innerHTML=''}
function lrow(k,v,hi=false){
  const r=document.createElement('div');r.className='lrow';
  const kd=document.createElement('span');kd.className='lk';kd.textContent=k+' ';
  const vd=document.createElement('span');vd.className=hi?'lh':'lv';vd.textContent=v;
  r.appendChild(kd);r.appendChild(vd);
  out.appendChild(r);out.scrollTop=out.scrollHeight;
}

// ═══════════════════════════
// STATUS & TIMER
// ═══════════════════════════
const locNames={corridor:'走廊',laf:'失物招领处',clinic:'心理诊所'};
function updateSt(){
  armGlitch();
  document.getElementById('stL').textContent=locNames[G.loc]||G.loc;
  document.getElementById('stT').textContent=G.timeLeft;
  document.getElementById('stD').textContent=G.deaths;
  document.getElementById('stI').textContent=G.inv.length;
  document.getElementById('stS').textContent=G.sus;
  // timer bar
  const pct=Math.max(0,G.timeLeft/60*100);
  document.getElementById('timerfill').style.width=pct+'%';
  const tb=document.getElementById('timerbar');
  tb.className=G.timeLeft<=10?'critical':G.timeLeft<=20?'low':'';
}
function tick(n=1){
  if(G.ended)return false;
  G.timeLeft=Math.max(0,G.timeLeft-n);
  G.totalMoves++;
  updateSt();
  if(G.loc==='corridor'&&Math.random()<0.25&&G.npcsSeen.length<NPC_EVENTS.length){
    const unseen=NPC_EVENTS.filter(e=>!G.npcsSeen.includes(e.id));
    if(unseen.length){
      const ev=unseen[Math.floor(Math.random()*unseen.length)];
      G.npcsSeen.push(ev.id);
      pb();
      p('[ 走廊碎片 ]','os');
      ev.lines.forEach(l=>p(l,'oi'));
      if(ev.ledger){G.inv.push('__npc_'+ev.id);}
      pb();
    }
  }
  if(G.loc==='clinic'){addMoNote();}
  if(G.timeLeft<=0){endTimeout();return false;}
  return true;
}

// ═══════════════════════════
// MO NOTES PANEL
// ═══════════════════════════
const MO_NOTE_TEMPLATES=[
  n=>{
    let firstStr='？？？';
    if(G.firstVisit==='clinic'&&G.moNamed) firstStr='"我"';
    else if(G.firstVisit==='laf'&&G.yanNamed) firstStr='"管理员"';
    return `受试者${P}第${n}次行动：选择与${firstStr}互动。`;
  },
  n=>`第${n}次记录：受试者在走廊停留时间超过预期。`,
  n=>`第${n}次记录：受试者怀疑值升至${G.sus}。反应正常。`,
  n=>`第${n}次记录：受试者反复询问同一问题。目的不明。`,
  n=>`第${n}次记录：受试者开始检查环境细节。进展良好。`,
  n=>`第${n}次记录：受试者持有道具${G.inv.filter(i=>!i.startsWith('__')).join('、')||'无'}。`,
  n=>`第${n}次记录：受试者死亡${G.deaths}次。复原能力稳定。`,
  n=>`第${n}次记录：受试者开始对本记录产生怀疑。`,
];
function addMoNote(){
  const n=G.moNotes.length+1;
  if(n>MO_NOTE_TEMPLATES.length)return;
  // 只存索引，渲染时才执行，这样名字状态变化后能实时更新
  G.moNotes.push(n-1);
  refreshNotePanel();
}

function refreshNotePanel(){
  const panel=document.getElementById('notes-panel');
  panel.innerHTML='';
  if(G.moNotes.length===0) return;
  panel.classList.add('visible');
  G.moNotes.forEach((idx,i)=>{
    const note=MO_NOTE_TEMPLATES[idx](i+1);
    const d=document.createElement('div');
    d.className='note-entry';
    d.textContent='[ '+(G.moNamed?'莫承威':'？？？')+' 观察记录 #'+(i+1)+' ] '+note;
    panel.appendChild(d);
  });
  panel.scrollTop=panel.scrollHeight;
}

// ═══════════════════════════
// CORRIDOR NPC EVENTS
// ═══════════════════════════
const NPC_EVENTS=[
  {id:'student1',ledger:true,lines:[
    '一个学生从走廊另一头走来。',
    '他低着头，抱着一摞书。',
    '经过你身边的时候，他停了一下。',
    '"你也是来找东西的吗？"',
    '然后他继续走，消失在走廊尽头。',
    '你没来得及问他的名字。',
  ]},
  {id:'teacher1',ledger:false,lines:[
    '走廊里忽然出现一个穿白衬衫的女人。',
    '她走得很快，像是有急事。',
    '经过你时，她看了你一眼。',
    '"你不应该在这里。"',
    '然后她消失了。',
    '走廊里没有任何门在那个方向。',
  ]},
  {id:'child1',ledger:true,lines:[
    '你听见走廊尽头有脚步声。',
    '一个很小的孩子坐在地上，面对着墙。',
    '你走近。他没有转身。',
    '"我的东西丢了。"',
    '"她说会帮我保管。"',
    '"但我不记得我丢了什么了。"',
    '你再走近一步。他消失了。',
    '地板上留着一双很小的鞋印。',
  ]},
  {id:'janitor1',ledger:false,lines:[
    '一个老人拿着拖把从旁边经过。',
    '他在你面前停下来，用拖把指着失物招领处的方向。',
    '"那两个，"他说，"认识的时间比这栋楼还长。"',
    '"别问我怎么知道的。"',
    '他继续拖地，没有再说话。',
  ]},
  {id:'mirror1',ledger:false,lines:[
    '走廊墙上有一面镜子，你之前没注意到。',
    '你在镜子里看见自己。',
    '然后你看见——镜子里的你，比你晚了半秒才动。',
    '你快速转身。走廊空无一人。',
    '再看镜子。镜子里的你正常了。',
    '但它嘴角的弧度和你的，不完全一样。',
  ]},
];

// ═══════════════════════════
// INVENTORY ITEMS
// ═══════════════════════════
const ITEMS={
  '录音机':{
    desc:'一台老式录音机。按下播放键，里面有声音。',
    useYan:()=>{
      pb();
      p('你把录音机放在柜台上。','oi');
      p('她抬头，看了一眼，然后翻开登记册。','oi');
      pb();
      pYan();
      p('"失主：林晓晨。高三二班。"','oy');
      p('"死于四月十二日。"','oy');
      pb();
      p('停顿。','oi');
      pb();
      pYan();
      p('"录音机里是她最后录的那句话。"','oy');
      p('"我没有权限播放。"','oy');
      p('"但我知道她说了什么。"','oy');
      pb();
      p('她合上册子，没有继续说。','oi');
      G.sus+=2;
    },
    useMo:()=>{
      pb();
      p('你把录音机放在桌上。','oi');
      p('莫承威看了它很久。','oi');
      pb();
      pMo();
      p('"这不是你的。"','om');
      pb();
      p('停顿。','oi');

function btn(t,fn,cls=''){
  const b=document.createElement('button');
  b.className='cb'+(cls?' '+cls:'');
  b.textContent=t;b.onclick=fn;
  document.getElementById('ch').appendChild(b);
}
function clrCh(){document.getElementById('ch').innerHTML=''}
function renderCh(arr){clrCh();arr.forEach(o=>{btn(o.t,()=>{if(o.s){G.sus+=o.s}o.a()},o.c||'');})}

}

function doInspect(area,spot){
  const key=area.slice(0,3)+'_'+spot;
  const lines=INSPECT[area][spot];
  G.inspected[key]=true;
  if(!tick(1))return;
  clr();
  p('[ 检查：'+spot+' ]','os');pb();
  lines.forEach(l=>p(l,l.startsWith('"')?'oy':'on'));
  pb();
  // pickup chance
  const pickMap={
    'cor_灯管':null,
    'laf_柜台侧面':null,
    'cli_桌上文件':null,
  };
  // item pickups on first inspect
  const itemDrops={
    'cor_走廊尽头':'军用绷带',
    'laf_架子最高层':null,
    'cli_书架':'照片',
    'cor_墙上的告示':'钥匙链',
  };
  const drop=itemDrops[key];
  if(drop&&!G.inv.includes(drop)&&!G.inv.includes('__got_'+key)){
    G.inv.push(drop);G.inv.push('__got_'+key);
    pb();p('[ 获得：'+drop+' ]','oitem');
    updateSt();
  }
  G.sus+=(G.inspected[key]?0:1);
  const prevLoc=G.loc;
  renderCh([{t:'← 继续',a:()=>{if(prevLoc==='laf')lafHub();else if(prevLoc==='clinic')clinicHub();else corridorHub();}}]);
}

// ═══════════════════════════
function useItemMenu(loc){
  clr();
  p('🎒 选择要展示的道具：','ol');pb();
  const realInv=G.inv.filter(i=>!i.startsWith('__'));
  const arr=realInv.map(item=>({
    t:item,
    a:()=>{
      clr();
      p('你拿出「'+item+'」。','oi');
      const def=ITEMS[item];
      if(!def){p('没什么特别的反应。','oi');}
      else{
        if(loc==='laf'&&def.useYan){
          def.useYan();
          // 交给晏明烛后从背包移除
          const idx2=G.inv.indexOf(item);
          if(idx2>-1){G.inv.splice(idx2,1);}
          updateSt();
        } else if(loc==='clinic'&&def.useMo){
          def.useMo();
        } else if(loc==='corridor'){
          p('这里没有人。你把它放回去。','oi');
        } else {
          p('对方没有特别的反应。','oi');
        }
      }
      pb();
      renderCh([{t:'← 继续',a:()=>{if(loc==='laf')lafHub();else if(loc==='clinic')clinicHub();else corridorHub();}}]);
    }
  }));
  arr.push({t:'← 取消',a:()=>{if(loc==='laf')lafHub();else if(loc==='clinic')clinicHub();else corridorHub();}});
  renderCh(arr);
}

function die(msg){
  if(G.ended)return;
  if(!msg && !G.deathWarned){
    G.deathWarned=true;
    clr();
    p('这将永久增加你的死亡计数。','ow');pb();
    p('死亡累积至5次后，将触发特殊选项。','os');pb();
    renderCh([
      {t:'确认走向黑暗',c:'dn',a:()=>die('__confirmed__')},
      {t:'← 返回',a:()=>{
        if(G.loc==='laf')lafHub();
        else if(G.loc==='clinic')clinicHub();
        else corridorHub();
      }},
    ]);
    return;
  }
  const _msg=(msg==='__confirmed__')?null:msg;
  G.deaths++;G.timeLeft=Math.min(60,G.timeLeft+8);tick(0);clr();
  p(_msg||('☠️ '+P+'，你死了。世界在震颤，然后重新聚合。'),'oe');pb();
  p('时间奖励：+8','os');pb();
  updateSt();
  if(G.deaths>=5){
    pb();p('你死了太多次了。','ow');pb();
    renderCh([
      {t:'死亡结局③——无人认领',c:'dn',a:()=>endDeath3()},
      {t:'死亡结局②——删档重开',c:'dn',a:()=>endDeath2()},
      {t:'强行翻开登记册',c:'dn',a:()=>endDeath1()},
      {t:'继续',a:()=>corridorHub()},
    ]);
    return;
  }
  G.loc='corridor';
  renderCh([
    {t:'继续',a:()=>corridorHub()},
    {t:'强行翻开登记册',c:'dn',a:()=>endDeath1()},
  ]);
}

  {id:'endBad1',    type:'bad',    name:'《 未 注 意 到 》', hint:'你丢掉的东西，连你自己都不知道。'},
  {id:'endBad2',    type:'bad',    name:'《 最 正 常 的 那 个 》', hint:'那1页，比47页更重要。'},
  {id:'endBad3',    type:'special',name:'《 在 职 》',       hint:'把东西放在窗口，说清楚在哪里捡的。'},
  {id:'assistMo',   type:'special',name:'《 观 察 者 》',    hint:'不要写「害怕」。写「应激反应，程度3」。'},
  {id:'endDeath1',  type:'death',  name:'《 存 档 损 坏 》', hint:'你翻到了最后一页。'},
  {id:'endDeath2',  type:'death',  name:'《 覆 盖 》',       hint:'上一个人把位置留给你了。'},
  {id:'endDeath3',  type:'death',  name:'《 无 人 认 领 》', hint:'它一直在等你来认领。'},
  {id:'endTimeout', type:'death',  name:'《 超 时 留 置 》', hint:'时间耗尽之后，你去了哪里。'},
  {id:'hidden',     type:'hidden', name:'《 1997 》',        hint:'???'},
  {id:'noname',     type:'death',  name:'《 你 忘 记 了 你 的 名 字 》', hint:'有些东西，丢了就找不回来了。'},
];

const TYPE_LABEL = {
  good:   '好结局',
  normal: '普通结局',
  bad:    '坏结局',
  special:'特殊结局',
  death:  '死亡结局',
  hidden: '隐藏结局',
};
const TYPE_COLOR = {
  good:   'oG',
  normal: 'oN',
  bad:    'oB',
  special:'oy',
  death:  'oe',
  hidden: 'og',
};

function showCatalog(){
  clr();
  p('◈  结 局 图 鉴','ol'); sep(); pb();

  const total = ENDING_CATALOG.length;
  const unlocked = ENDING_CATALOG.filter(e => endingsUnlocked.has(e.id)).length;
  p(`已解锁 ${unlocked} / ${total}`,'os');
  if(unlocked > 0 && unlocked < total){
    pb();
    // Yan's hint - how many are missing, but not which ones
    const missing = total - unlocked;
    pYan();
    if(missing >= 6){
      p('"你还有很多东西没有认领。"','oy');
    } else if(missing >= 3){
      p('"你还有'+missing+'件东西没有认领。"','oy');
    } else if(missing === 2){
      p('"你还有两件东西没有认领。"','oy');
      p('"快了。"','oy');
    } else if(missing === 1){
      p('"你还有一件东西没有认领。"','oy');
      pb();p('停顿。','oi');pb();
      p('"就一件。"','oy');
    }
  } else if(unlocked === total){
    pb();
    pYan();
    p('"都认领了。"','oy');
    pb();p('停顿。','oi');pb();
    p('"很少有人做到这件事。"','oy');
  }
  pb(); sep(); pb();

  ENDING_CATALOG.forEach(e => {
    const got = endingsUnlocked.has(e.id);
    const typeLabel = TYPE_LABEL[e.type] || '';
    const typeCls   = TYPE_COLOR[e.type]  || 'on';

    if(got){
      p(typeLabel, typeCls);
      p(e.name, typeCls);
      p(e.hint, 'oi');
    } else {
      p(typeLabel, 'os');
      p('《 ？ ？ ？ 》', 'os');
      p('——', 'os');
    }
    pb();
  });

  sep(); pb();

  // show where player currently is and return
  const prevLoc = G.loc;
  renderCh([{t:'← 返回',a:()=>{
    clr();
    if(G.ended){
      p('游戏已结束。','os');
      renderCh([{t:'🔄 重新开始',a:resetGame}]);
    } else {
      if(prevLoc==='laf') { G.yanV--; enterLAF(); }
      else if(prevLoc==='clinic') { G.moV--; enterClinic(); }
      else corridorHub();
    }
  }}]);
}


function resetGame(){
  // save name history before reset
  if(P&&P!=='旅人') nameHistory.push(P);
  lastFirstVisit = G.firstVisit;
  P='旅人';
  G={loc:'corridor',inv:[],sus:0,deaths:0,yanV:0,moV:0,loopQ:0,moLoopQ:0,
    corridorSeen:false,hasNote:false,noteUsed:false,chap:1,ended:false,
    bandageTalked:false,sawShelf:false,inspected:{},npcsSeen:[],moNotes:[],
    timeLeft:60,totalMoves:0,usedItems:[],
    yanGreeted:false,moGreeted:false,deathWarned:false,firstVisit:null,yanNamed:false,moNamed:false,yanTalkedFirst:false,moTalkedFirst:false,whereAsked:false,whereAsked2:false};
  clr();
  document.getElementById('notes-panel').innerHTML='';
  document.getElementById('notes-panel').classList.remove('visible');
  document.getElementById('modal').style.display='flex';
  document.getElementById('nin').value='';
  clrCh();updateSt();
}

function startGame(name){
  const trimmed = name.trim();
  if(!trimmed){
    // blank name ending
    document.getElementById('modal').style.display='none';
    clr();
    sep();
    p('死  亡  结  局','oB');
    p('《 你 忘 记 了 你 的 名 字 》','oB');
    sep();pb();
    p('你停在那里，看着那一栏。','oi');pb();
    p('你想写一个名字。','oi');pb();
    p('但你想不起来。','oi');pb();
    p('你想了很久。','oi');
    p('走廊里的灯管在闪。','oi');pb();
    p('你想——也许名字不重要。','oi');pb();
    p('你走进去了。没有名字。','oi');pb();
    sep();pb();
    p('失物招领处。','ol');pb();
    p('她坐在柜台后面。抬起头，看了你一眼。','oi');pb();
    pYan();
    p('"东西放窗口。说清楚哪里捡的。"','oy');pb();
    p('你站在那里。','oi');pb();
    pYan();
    p('"你叫什么名字。"','oy');pb();
    p('你没有回答。','oi');pb();
    p('停顿。','oi');pb();
    p('她翻开登记册。在某一页写了什么。','oi');pb();
    p('她把册子转过来给你看。','oi');pb();
    lrow('失物','一个名字');
    lrow('失主','未知');
    lrow('状态','遗失，无法归还',true);
    lrow('备注','失主本人亦不记得');pb();
    p('她合上册子。','oi');pb();
    pYan();
    p('"你不记得自己的名字了。"','oy');pb();
    p('停顿。','oi');pb();
    pYan();
    p('"没关系。"','oy');
    p('"我帮你记着。"','oy');pb();
    sep();pb();
    p('你迷失在黑暗之中。','ob');pb();
    p('连名字都丢掉的人，走不出这栋楼。','oi');pb();
    endingsUnlocked.add('noname');
    checkHiddenEnding();
    renderCh([{t:'🔄 重新开始',a:resetGame}]);
    return;
  }
  P=trimmed;
  document.getElementById('modal').style.display='none';
  clr();
  p('◈  失物招领处','ol');sep();pb();
  p(P+'，你醒来的时候，不知道自己在哪里。');
  p('走廊很长。灯管有一根在闪。');
  p('尽头有两扇门。');pb();
  p('左边的门牌：心理诊所。');
  p('右边的门牌生锈，你凑近看——失物招领处。');pb();
  p('【你在一栋没有出口的楼里。】','os');
  p('【时间有限。每次行动消耗1格时间，共60格。】','os');
  p('【死亡可恢复8格时间。检查环境可发现道具。】','os');pb();sep();pb();
  G.loc='corridor';updateSt();
  renderCh([
    {t:'→ 失物招领处',a:()=>{if(!tick())return;enterLAF()}},
    {t:'→ 心理诊所',a:()=>{if(!tick())return;enterClinic()}},
    {t:'👁 先观察走廊',c:'sp',a:()=>{
      if(!tick())return;clr();
      p('你没有立刻走过去。走廊两侧贴着告示，大多泛黄。','oi');
      p('你看见一张比较新的：','oi');pb();
      lrow('公告','有遗失物者请前往B栋侧门失物招领处登记。管理员：？？？，全年无休。');
      lrow('日期','1997年 · 2005年 · 2014年 · 2026年',true);
      lrow('备注','以上均为同一张告示。');pb();
      p('同一张告示。不同年份。','oi');pb();G.sus+=1;
      renderCh([
        {t:'→ 失物招领处',a:()=>{if(!tick())return;enterLAF()}},
        {t:'→ 心理诊所',a:()=>{if(!tick())return;enterClinic()}},
        {t:'……（走向黑暗）',c:'dn',a:()=>die()},
      ]);
    }},
    {t:'……（走向黑暗）',c:'dn',a:()=>die()},
  ]);
}

function enterLAF(){
  G.yanV++;G.loc='laf';updateSt();clr();
  if(!G.firstVisit) G.firstVisit='laf';
  p('B栋 · 失物招领处','ol');pb();
  if(G.yanV===1 && !G.yanGreeted && nameHistory.length>0 && P!==nameHistory[nameHistory.length-1]){
    G.yanGreeted=true;
    const lastName=nameHistory[nameHistory.length-1];
    p('你推开门。声音在门口断了。','oi');pb();
    p('四面都是架子。钱包，钥匙，照片，录音机。每一件都贴着标签。');pb();
    p('柜台后面坐着一个女人。头发很黑，衬衫很白。');
    p('她抬起头，看了你一眼。然后，她又看了你一眼。','oi');pb();
    pYan();
    p('"……上一个'+lastName+'的东西，还放在这里。"','oy');pb();
    p('停顿。','oi');pb();
    pYan();
    p('"你要认领吗。"','oy');pb();
    setTimeout(()=>{
      renderCh([
        {t:'"认领。"',s:2,a:()=>{
          clr();
          p('她翻开册子。在某一页写了你的名字。','oi');pb();
          lrow('认领人',P,true);lrow('原失主',lastName);lrow('备注','已转交');pb();
          p('她合上册子。低下头。','oi');pb();
          pYan();
          p('"东西在架子上。自己找。"','oy');pb();
          p('她重新拿起笔。没有再看你。','oi');
          G.sus+=2;lafHub();
        }},
        {t:'"不认领。"',s:0,a:()=>{
          clr();
          p('她看了你一眼。','oi');pb();
          pYan();p('"好。"','oy');pb();
          lrow('备注','新来访者拒绝认领，遗留物继续存放');pb();
          p('她重新低下头，翻了一页。','oi');
          lafHub();
        }},
      ]);
    },0);
    return;
  }
  if(G.yanV===1){
    p('你推开门。声音在门口断了。','oi');pb();
    p('房间不大。四面都是架子，塞满了东西。');
    p('钱包，钥匙，照片，录音机。每一件都贴着标签。');
    p('标签上的字很小。你凑近了才看得清。');pb();
    p('柜台后面坐着一个女人。头发很黑，衬衫很白。');
    p('她抬起头，看了你一眼。','oi');pb();
    pYan();
    p('"东西放窗口。说清楚哪里捡的。"','oy');pb();
    p('你放下去。她伸手接过去。','oi');
    p('指腹在你手背擦了一下。','oi');pb();
    pYan();
    p('"手这么凉。走廊里没暖气吗。"','oy');pb();
    p('她的语气像在关心你。','oi');
    p('但她的目光已经落在那件东西上了。','oi');
  } else if(G.yanV===2){
    p('你推开门。她没抬头。','oi');pb();
    pYan();p('"又来了。"','oy');pb();
    p('你站在柜台前。','oi');
    p('她翻了一页册子，才抬起眼皮看了你一眼。','oi');pb();
    pYan();p('"今天没带东西来？"','oy');pb();
    p('她低下头。笔尖在纸面上划了一道。','oi');pb();
    pYan();p('"那今天来做什么。"','oy');
  } else {
    p('你推开门。她已经在看你了。','oi');
    p('像她听到你脚步声了。或者像她一直在等。','oi');pb();
    pYan();p('"今天带什么了。"','oy');pb();
    p('你放东西。她拿过去，看一眼，翻开册子，写几笔。','oi');
    p('动作很快。像做过很多次了。','oi');pb();
    pYan();p('"还有别的吗。"','oy');
  }
  pb();lafHub();
}


function enterClinic(){
  G.moV++;G.loc='clinic';updateSt();clr();
  if(!G.firstVisit) G.firstVisit='clinic';
  p('B栋 · 心理诊所','ol');pb();
  if(G.moV===1 && !G.moGreeted && nameHistory.length>0 && P!==nameHistory[nameHistory.length-1]){
    G.moGreeted=true;
    const lastName=nameHistory[nameHistory.length-1];
    p('门开着。','oi');
    p('诊室不大。书架上的书按颜色排着。窗户开着一条缝，风把窗帘吹起来一点，又放下去。');pb();
    p('他抬起头看你。嘴角动了一下。','oi');pb();
    pMo();p('"啊，你来了。"','om');pb();
    p('停顿。他歪了一下头。碎发滑到脸颊旁边。他没有把它拨开。','oi');pb();
    pMo();
    p('"你的名字——"','om');pb();
    p('他停了一下。','oi');pb();
    pMo();
    p('"好像不是这个。"','om');pb();
    p('他的语气很轻，像在说一件无关紧要的小事。','oi');pb();
    p('你：','ou');p('"我叫'+P+'。"','ou');pb();
    p('他点了点头。嘴角动了一下，不像是笑，又有点像。','oi');pb();
    pMo();p('"嗯，'+P+'。"','om');pb();
    p('停顿。','oi');pb();
    pMo();p('"'+lastName+'更好听。"','om');pb();
    p('他低下头，翻开资料。','oi');
    p('像是这句话什么都不是。','oi');pb();
    if(nameHistory.length>=2){
      pb();p('他又抬起头，补充了一句：','oi');pb();
      pMo();
      p('"你之前还叫过'+nameHistory[nameHistory.length-2]+'。"','om');pb();
      p('停顿。','oi');pb();
      pMo();p('"换名字没有用的。"','om');pb();
      p('他继续低头写字。嘴角的那颗痣随着他低头消失在视线里。','oi');
      G.sus+=3;
    } else { G.sus+=2; }
    pb();clinicHub();return;
  }
  if(G.moV===1){
    p('门开着。','oi');
    p('诊室不大。书架上的书按颜色排着。');
    p('窗户开着一条缝，风把窗帘吹起来一点点，又放下去。');pb();
    p('桌子后面坐着一个人。');
    p('他看起来二十多岁。脸很白，眼睛很黑。');
    p('头发在脑后扎成一条低马尾，几缕碎发垂在脸侧。');
    p('嘴角有一颗很小的痣。');pb();
    p('他看见你了。他笑了一下。','oi');
    p('不是客气的笑。是那种——他看见你了，他觉得应该笑一下。','oi');pb();
    pMo();p('"啊，你来了。"','om');pb();
    p('他的声音很轻。像怕声音大了会把什么震碎。','oi');pb();
    pMo();p('"坐吧。"','om');p('"椅子是空的。"','om');pb();
    p('你坐下。他看着你。歪了一下头。','oi');
    p('碎发滑到脸颊旁边。他没有把它拨开。','oi');pb();
    pMo();p('"你今天……在想什么呢。"','om');pb();
    p('他说"在想什么呢"的时候，语气像是他真的不知道答案，真的想知道。','oi');
  } else if(G.moV===2){
    p('他抬起头。看见你的时候，嘴角动了一下。','oi');pb();
    pMo();p('"啊，又来了。"','om');pb();
    p('他放下笔。那支笔在桌面上轻轻滚了一下，碰到一本摊开的书。','oi');pb();
    pMo();
    p('"你上次走的时候，好像有点着急。"','om');pb();
    p('停顿。','oi');pb();
    pMo();p('"这次不着急吧。"','om');pb();
    p('他问得很认真。像是在确认一件对他来说很重要的事。','oi');
  } else {
    p('他抬起头。目光在你脸上停了一下。','oi');pb();
    pMo();
    p('"今天——比上次晚了大概二十分钟。"','om');pb();
    p('停顿。','oi');pb();
    pMo();
    p('"路上有什么东西让你停下来了吗。"','om');pb();
    p('他的语气还是温和的。像在问今天天气好不好。','oi');pb();
    p('你没有回答。他也没有追问。','oi');pb();
    p('他低下头。手指在纸面上慢慢划了一下。','oi');pb();
    pMo();p('"嗯，没关系。"','om');p('"记下来了。"','om');
  }
  pb();clinicHub();
}
